services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      # Map the model files to the new folder location
      - ./model_output:/app/model_output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/sentiment/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api/v1/sentiment/predict
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run src/ui.py --server.port 8501 --server.address 0.0.0.0
