services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./model_output:/app/model_output
      - djl_cache:/root/.djl.ai
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
      - OMP_NUM_THREADS=2
      - PYTORCH_NUM_INTEROP_THREADS=1
      - PYTORCH_NUM_INTRAOP_THREADS=2
    mem_limit: 2g
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/sentiment/health"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/api/v1/sentiment/predict
    mem_limit: 512m
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run src/ui.py --server.port 8501 --server.address 0.0.0.0

volumes:
  djl_cache: